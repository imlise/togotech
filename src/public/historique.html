<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique — Togo Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/pages/list.css" />
  <link rel="stylesheet" href="assets/css/pages/facture.css" />
</head>
<body class="app" data-page="historique">

  <div id="app-root"></div>
  <div class="app-main">
    <header class="app-header" id="app-header"></header>
    <div class="app-content">

      <div class="page-head">
        <div class="page-head__text">
          <h1 class="page-head__title">Historique</h1>
          <p class="page-head__sub">Recherche, filtres et actions sur l'ensemble de vos documents.</p>
        </div>
        <div class="page-head__actions"></div>
      </div>

      <div class="bulk-bar" id="bulkBar" hidden>
        <span class="bulk-bar__count">0 sélectionné(s)</span>
        <button class="btn btn--ghost btn--sm" id="bulkExport">Exporter</button>
        <button class="btn btn--ghost btn--sm" id="bulkDelete">Supprimer</button>
      </div>

      <div class="card">
        <div class="list-toolbar" style="padding:var(--space-5) var(--space-5) 0">
          <div class="list-toolbar__left">
            <div class="search search--wide">
              <svg class="search__icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5 13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              <input type="search" class="search__input" id="tableSearch" placeholder="Rechercher par n°, client, objet…" aria-label="Rechercher" />
            </div>
            <div class="pills" id="filterPills">
              <button class="pill is-active" data-filter-type="all">Tous</button>
              <button class="pill" data-filter-type="facture">Factures</button>
              <button class="pill" data-filter-type="proforma">Proformas</button>
            </div>
          </div>
          <div class="list-toolbar__right">
            <div class="export-group">
              <button class="export-btn" id="exportCSV">CSV</button>
              <button class="export-btn" id="exportPrint">Imprimer</button>
            </div>
          </div>
        </div>

        <div class="table-wrap" style="border:none;border-radius:0;margin-top:var(--space-4)">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:40px"><label class="check"><input type="checkbox" id="checkAll" class="check__input" /><span class="check__box"></span></label></th>
                <th class="sortable" data-col="numero">N° Document</th>
                <th class="sortable" data-col="type">Type</th>
                <th class="sortable" data-col="client">Client</th>
                <th class="sortable" data-col="objet">Objet</th>
                <th class="sortable" data-col="montant">Montant</th>
                <th class="sortable" data-col="date">Date</th>
                <th>Statut</th>
                <th style="width:120px">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div class="empty-state" id="tableEmpty" hidden>
            <div class="empty-state__illustration">
              <span class="empty-state__illustration__dot empty-state__illustration__dot--1"></span>
              <span class="empty-state__illustration__dot empty-state__illustration__dot--2"></span>
              <span class="empty-state__illustration__dot empty-state__illustration__dot--3"></span>
              <svg class="empty-state__illustration__glyph" viewBox="0 0 24 24" fill="none"><path d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.5"/><path d="M8 9h8M8 13h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <h3 class="empty-state__title">Aucun document</h3>
            <p class="empty-state__desc">Créez votre première facture ou modifiez vos filtres de recherche.</p>
            <a href="facture.html" class="btn btn--primary" style="margin-top:var(--space-4)">Créer une facture</a>
          </div>
        </div>
        <div class="pagination">
          <div class="pagination__info" id="paginationInfo">—</div>
          <div class="pagination__controls" id="paginationControls"></div>
          <div style="display:flex;align-items:center;gap:var(--space-2)">
            <label class="text-caption" for="perPage">Par page</label>
            <select id="perPage" class="field__select" style="height:32px;width:auto;padding-right:var(--space-8)">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
            </select>
          </div>
        </div>
      </div>
            <div id="printReport" class="print-report"></div>
    </div>
  </div>

  <script src="assets/js/core/app.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script src="assets/js/core/layout.js"></script>
  <script src="assets/js/core/components.js"></script>
  <script src="assets/js/modules/invoice-template.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="assets/js/modules/pdf-export.js"></script>
  <script src="assets/js/modules/documents-table.js"></script>
  <script src="assets/js/pages/historique.js"></script>
  <script src="assets/js/core/api.js"></script>
</body>
</html>
