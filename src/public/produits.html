<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Produits — Togo Tech</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/pages/list.css">
    <link rel="stylesheet" href="assets/css/pages/produit.css">

    <style>
        .dropdown{
            background-color: white;
            border-radius: 30px;
        }
        .products-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
            gap:24px;
        }

        .product-card{
            overflow:hidden;
        }

        .product-image{
            width:100%;
            height:200px;
            object-fit:cover;
            background:#f3f4f6;
            border-radius:12px;
        }

        .product-body{
            margin-top:16px;
        }

        .product-title{
            font-size:18px;
            font-weight:700;
            margin-bottom:8px;
        }

        .product-description{
            color:#6b7280;
            font-size:14px;
            line-height:1.5;
            height:44px;
            overflow:hidden;
        }

        .product-price{
            margin-top:16px;
            font-size:20px;
            font-weight:700;
            color:var(--color-primary,#2563eb);
        }

        .product-discount{
            display:inline-flex;
            margin-top:8px;
            padding:4px 10px;
            border-radius:20px;
            background:#dcfce7;
            color:#15803d;
            font-size:13px;
            font-weight:600;
        }

        .product-head{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            margin-bottom:14px;
        }

        .product-footer{
            margin-top:18px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
    </style>

</head>

<body class="app" data-page="produits">

<div id="app-root"></div>

<div class="app-main">

    <header class="app-header" id="app-header"></header>

    <div class="app-content">

        <div class="page-head">

            <div class="page-head__text">

                <h1 class="page-head__title">
                    Produits
                </h1>

                <p class="page-head__sub">
                    Gérez votre catalogue de produits.
                </p>

            </div>

            <button
                class="btn btn--primary"
                id="addProduitBtn">

                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M7 1v12M1 7h12"
                          stroke="currentColor"
                          stroke-width="1.5"
                          stroke-linecap="round"/>
                </svg>

                Ajouter un produit

            </button>

        </div>

        <div class="list-toolbar" style="margin-bottom:var(--space-5)">

            <div class="search search--wide">

                <svg class="search__icon"
                     width="14"
                     height="14"
                     viewBox="0 0 14 14"
                     fill="none">

                    <circle
                        cx="6"
                        cy="6"
                        r="4"
                        stroke="currentColor"
                        stroke-width="1.3"/>

                    <path
                        d="M9.5 9.5L13 13"
                        stroke="currentColor"
                        stroke-width="1.3"
                        stroke-linecap="round"/>

                </svg>

                <input
                    type="search"
                    class="search__input"
                    id="produitSearch"
                    placeholder="Rechercher un produit...">

            </div>

        </div>

        <div
            class="products-grid"
            id="produitsGrid">
        </div>

        <div
            class="empty-state"
            id="produitsEmpty"
            hidden>

            <div class="empty-state__illustration empty-state__illustration--amber">

                <span class="empty-state__illustration__dot empty-state__illustration__dot--1"></span>

                <span class="empty-state__illustration__dot empty-state__illustration__dot--2"></span>

                <span class="empty-state__illustration__dot empty-state__illustration__dot--3"></span>

                <svg
                    class="empty-state__illustration__glyph"
                    viewBox="0 0 24 24"
                    fill="none">

                    <rect
                        x="4"
                        y="5"
                        width="16"
                        height="14"
                        rx="2"
                        stroke="currentColor"
                        stroke-width="1.5"/>

                    <path
                        d="M8 9h8"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"/>

                    <path
                        d="M8 13h5"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"/>

                </svg>

            </div>

            <h3 class="empty-state__title">
                Aucun produit
            </h3>

            <p class="empty-state__desc">
                Ajoutez votre premier produit afin de commencer votre catalogue.
            </p>

        </div>

    </div>

</div>

<script src="assets/js/core/app.js"></script>
<script src="assets/js/core/auth.js"></script>
<script src="assets/js/core/layout.js"></script>
<script src="assets/js/core/components.js"></script>

<script src="assets/js/pages/produit.js"></script>

</body>
</html>
