<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Togo Tech Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/pages/dashboard.css" />
  <link rel="stylesheet" href="assets/css/welcome-modal.css" />
</head>
<body class="app" data-page="dashboard">

  <div id="app-root"></div>

  <div class="app-main">
    <header class="app-header" id="app-header"></header>

    <div class="app-content">
      <div class="page-head">
        <div class="page-head__text">
          <h1 class="page-head__title" id="dashTitle">Dashboard</h1>
          <p class="dashboard-greeting" id="dashGreeting">Chargement…</p>
        </div>
        <div class="page-head__actions"></div>
      </div>

      <!-- KPI Cards -->
      <div class="grid-stats" id="statsGrid"></div>

      <!-- Main grid -->
      <div class="grid-main-side dashboard-grid">
        <div class="card chart-card">
          <div class="chart-card__head">
            <div>
              <h2 class="chart-card__title">Chiffre d'affaires</h2>
              <p class="chart-card__sub">Évolution sur les 6 derniers mois</p>
            </div>
            <div class="tabs" role="tablist">
              <button class="tab is-active" data-period="6months">6 mois</button>
              <button class="tab" data-period="12months">12 mois</button>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="revenueChart" aria-label="Graphique du chiffre d'affaires"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="card__header">
            <h2 class="card__title">Raccourcis</h2>
          </div>
          <div class="card__body">
            <div class="quick-actions">
              <a href="facture.html?type=proforma" class="quick-action quick-action--proforma">
                <span class="quick-action__icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M3 2h10a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 8l2 2 3-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                <div><div class="quick-action__text">Proforma</div><div class="quick-action__sub">Devis provisoire</div></div>
                <svg class="quick-action__deco" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="24" stroke="currentColor" stroke-width="3"/><path d="M22 32l8 8 14-16" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
              </a>
              <a href="clients.html" class="quick-action quick-action--clients">
                <span class="quick-action__icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 13.5c0-2.5 2.2-4.5 4.5-4.5s4.5 2 4.5 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>
                <div><div class="quick-action__text">Clients</div><div class="quick-action__sub">Gérer les contacts</div></div>
                <svg class="quick-action__deco" viewBox="0 0 64 64" fill="none"><circle cx="24" cy="22" r="10" stroke="currentColor" stroke-width="3"/><path d="M8 52c0-12 8-20 16-20s16 8 16 20" stroke="currentColor" stroke-width="3"/></svg>
              </a>
              <a href="parametres.html" class="quick-action quick-action--settings">
                <span class="quick-action__icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>
                <div><div class="quick-action__text">Paramètres</div><div class="quick-action__sub">Entreprise & PDF</div></div>
                <svg class="quick-action__deco" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="8" stroke="currentColor" stroke-width="3"/><path d="M32 8v8M32 48v8M8 32h8M48 32h8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="grid-2 dashboard-bottom-grid">
        <div class="card recent-table">
          <div class="card__header">
            <h2 class="card__title">Documents récents</h2>
            <a href="historique.html" class="btn btn--ghost btn--sm">Voir tout →</a>
          </div>
          <div class="table-wrap" style="border:none;border-radius:0">
            <table class="data-table" id="recentTable">
              <thead>
                <tr>
                  <th>N° Document</th>
                  <th>Type</th>
                  <th>Client</th>
                  <th>Montant</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="recentBody"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card__header">
            <h2 class="card__title">Activité récente</h2>
          </div>
          <div class="card__body" style="padding-top:0;padding-bottom:0">
            <div class="activity-list" id="activityList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/core/app.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script src="assets/js/core/layout.js"></script>
  <script src="assets/js/core/components.js"></script>
  <script src="assets/js/pages/dashboard.js"></script>
  <script src="assets/js/modules/welcome-modal.js"></script>
</body>
</html>
