<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Togo Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/pages/settings.css" />
</head>
<body class="app" data-page="notifications">
  <div id="app-root"></div>
  <div class="app-main">
    <header class="app-header" id="app-header"></header>
    <div class="app-content">
      <div class="page-head">
        <div class="page-head__text">
          <h1 class="page-head__title">Notifications</h1>
          <p class="page-head__sub">Historique de toutes les actions sur vos documents.</p>
        </div>
        <button class="btn btn--secondary btn--sm" id="markAllRead">Tout marquer comme lu</button>
      </div>
      <div class="card">
        <div class="notif-list" id="notifList"></div>
        <div class="empty-state" id="notifEmpty" hidden>
          <div class="empty-state__illustration">
          <span class="empty-state__illustration__dot empty-state__illustration__dot--1"></span>
          <span class="empty-state__illustration__dot empty-state__illustration__dot--2"></span>
          <span class="empty-state__illustration__dot empty-state__illustration__dot--3"></span>
          <svg class="empty-state__illustration__glyph" viewBox="0 0 24 24" fill="none"><path d="M5 9.5a7 7 0 0 1 14 0V16l2 2.5H3L5 16V9.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9.5 19a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <h3 class="empty-state__title">Aucune notification</h3>
          <p class="empty-state__desc">Vos actions apparaîtront ici.</p>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/core/app.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script src="assets/js/core/layout.js"></script>
  <script src="assets/js/core/components.js"></script>
  <script src="assets/js/pages/notifications.js"></script>
</body>
</html>
