<!DOCTYPE html>

<html lang="fr">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mot de passe oublié — Togo Tech</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/main.css" />

  <link rel="stylesheet" href="assets/css/pages/login.css" />

</head>

<body>



  <div class="auth-page">

    <aside class="auth-brand" aria-hidden="true">

      <div class="auth-brand__bg">

        <div class="auth-brand__grid"></div>

        <div class="auth-brand__glow"></div>

      </div>

      <div class="auth-brand__content">

        <div class="auth-brand__logo">

          <img src="assets/img/logo-togotech.png" alt="Togo Tech" width="72" height="72" />

          <div class="auth-brand__logo-text">

            <span class="auth-brand__logo-name">Togo Tech</span>

            <span class="auth-brand__logo-tag">Facturation Pro</span>

          </div>

        </div>

        <h1 class="auth-brand__headline">Récupération<br /><em>sécurisée.</em></h1>

        <p class="auth-brand__desc">Un lien de réinitialisation vous sera envoyé par e-mail. Vérifiez également vos spams.</p>

      </div>

      <p class="auth-brand__footer">© 2026 Togo Tech</p>

    </aside>



    <main class="auth-form-panel">

      <div class="auth-form-wrap">

        <div class="auth-form__logo-top">

          <img src="assets/img/logo-togotech.png" alt="Togo Tech" width="48" height="48" />

          <div>

            <div class="text-heading-md" style="font-weight:700;color:var(--tt-navy-950)">Togo Tech</div>

          </div>

        </div>



        <div class="auth-form__header">

          <h1 class="auth-form__title">Mot de passe oublié</h1>

          <p class="auth-form__sub">Entrez votre adresse e-mail pour recevoir un lien de réinitialisation.</p>

        </div>



        <form id="forgotForm" novalidate>

          <div class="field" id="emailField">

            <label class="field__label" for="email">Adresse e-mail</label>

            <div class="field__input-wrap">

              <span class="field__icon">

                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="m2 4.5 6 4 6-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>

              </span>

              <input type="email" id="email" class="field__input has-icon" placeholder="vous@exemple.com" autocomplete="email" required />

            </div>

            <span class="field__error" id="emailError" role="alert"></span>

          </div>



          <button type="submit" class="btn btn--primary btn--lg auth-form__submit" id="submitBtn">

            Envoyer le lien

          </button>



          <div class="auth-form__banner" id="formSuccessBanner" role="status" style="background:var(--color-success-bg);border-color:var(--color-success-border);color:var(--tt-mint-600);display:none"></div>

        </form>



        <p class="auth-form__footer" style="margin-top:var(--space-6)">

          <a href="index.html" class="auth-form__link">← Retour à la connexion</a>

        </p>

      </div>

    </main>

  </div>



  <script src="assets/js/core/app.js"></script>

  <script src="assets/js/pages/forgot-password.js"></script>

</body>

</html>
