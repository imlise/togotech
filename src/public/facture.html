<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouvelle facture — Togo Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/pages/facture.css" />
</head>
<body class="app" data-page="facture">

  <div id="app-root"></div>

  <div class="app-main">
    <header class="app-header" id="app-header"></header>

    <div class="app-content app-content--wide app-content--flush">
      <div class="invoice-layout">

        <!-- Editor -->
        <section class="invoice-editor" aria-label="Éditeur de document">
          <div class="page-head editor-toolbar" style="margin-bottom:var(--space-5);padding-top:0">
            <div class="page-head__text">
              <div class="editor-toolbar__title-row">
                <h1 class="page-head__title" id="editorTitle">Nouvelle facture</h1>
                <button type="button" class="btn btn--ghost btn--icon btn--sm" id="duplicateBtn" hidden aria-label="Dupliquer ce document" title="Dupliquer ce document">
                  <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="4" width="8.5" height="9.5" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 4V2.5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1V10a1 1 0 0 1-1 1h-1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                </button>
              </div>
              <p class="page-head__sub">L'aperçu se met à jour en temps réel pendant la saisie.</p>
            </div>
            <div class="editor-toolbar__actions">
              <div class="segmented" role="group" aria-label="Type de document">
                <button type="button" class="segmented__btn is-active" data-type="facture" id="typeFacture">Facture</button>
                <button type="button" class="segmented__btn" data-type="proforma" id="typeProforma">Proforma</button>
              </div>
              <div class="editor-toolbar__divider" aria-hidden="true"></div>
              <button type="button" class="btn btn--secondary btn--sm" id="saveDraftBtn">Brouillon</button>
              <button type="button" class="btn btn--navy btn--sm" id="downloadPdfBtn">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7.5M3.5 6l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M1.5 10.5v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                PDF
              </button>
              <button type="submit" form="invoiceForm" class="btn btn--primary btn--sm" id="saveBtn">Enregistrer</button>
            </div>
          </div>

          <form id="invoiceForm" novalidate>
            <!-- General info -->
            <div class="form-section">
              <div class="form-section__head">
                <span class="form-section__title">Informations générales</span>
                <span class="form-section__step">Étape 1</span>
              </div>
              <div class="field-row field-row--2">
                <input type="hidden" id="fNumero" />
                <div class="field">
                 <label class="field__label" for="fSuiviPar">Dossier suivi par</label>
                  <input type="text" id="fSuiviPar" class="field__input" placeholder="Nom de la personne" />
                </div>
                <div class="field">
                  <label class="field__label" for="fDate">Date d'émission</label>
                  <input type="date" id="fDate" class="field__input" required />
                </div>
              </div>
              <div class="field-row field-row--2">
                <div class="field">
                 <label class="field__label" for="fContact">Contact</label>
                  <input type="text" id="fContact" class="field__input" inputmode="tel" placeholder="Numéro de téléphone" />
                </div>
                <div class="field">
                  <label class="field__label" for="fDevise">Devise</label>
                  <select id="fDevise" class="field__select">
                    <option value="FCFA">FCFA — Franc CFA</option>
                    <option value="EUR">EUR — Euro</option>
                    <option value="USD">USD — Dollar US</option>
                  </select>
                </div>
              </div>
              <div class="field">
                <label class="field__label" for="fObjet">Objet</label>
                <input type="text" id="fObjet" class="field__input" placeholder="Description de la prestation ou du produit" required />
              </div>
            </div>

            <!-- Client -->
            <div class="form-section">
              <div class="form-section__head">
                <span class="form-section__title">Client</span>
                <span class="form-section__step">Étape 2</span>
              </div>
              <div class="field">
                <label class="field__label" for="fClient">Nom / Société</label>
                <input type="text" id="fClient" class="field__input" list="clientList" placeholder="Rechercher ou saisir un client" required />
                <datalist id="clientList"></datalist>
              </div>
              <div class="field-row field-row--2">
                <div class="field">
                  <label class="field__label" for="fEmail">E-mail</label>
                  <input type="email" id="fEmail" class="field__input" placeholder="client@exemple.com" />
                </div>
                <div class="field">
                  <label class="field__label" for="fTelephone">Téléphone</label>
                  <input type="tel" id="fTelephone" class="field__input" placeholder="+228 XX XX XX XX" />
                </div>
              </div>
              <div class="field">
                <label class="field__label" for="fAdresse">Adresse</label>
                <input type="text" id="fAdresse" class="field__input" placeholder="Adresse complète du client" />
              </div>
            </div>

            <!-- Lines -->
            <div class="form-section">
              <div class="form-section__head">
                <span class="form-section__title">Lignes de produits</span>
                <button type="button" class="btn btn--secondary btn--sm" id="addLineBtn">
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                  Ajouter
                </button>
              </div>
              <div class="lines-editor" id="linesContainer"></div>
              <div class="totals-panel">
                <div class="totals-panel__row"><span>Sous-total HT</span><span class="text-mono" id="totalHT">0 FCFA</span></div>
                <div class="totals-panel__row"><span>TVA (<span id="tvaRateLabel">18</span>%)</span><span class="text-mono" id="totalTVA">0 FCFA</span></div>
                <div class="totals-panel__row totals-panel__row--final"><span>Total TTC</span><span class="text-mono" id="totalTTC">0 FCFA</span></div>
              </div>
            </div>

            <!-- Conditions -->
            <div class="form-section">
              <div class="form-section__head">
                <span class="form-section__title">Conditions & remarques</span>
              </div>
              <div class="field-row field-row--2">
                <div class="field">
                  <label class="field__label" for="fTva">Taux TVA (%)</label>
                  <input type="number" id="fTva" class="field__input" value="18" min="0" max="100" step="0.5" />
                </div>
                <div class="field">
                  <label class="field__label" for="fRemise">Remise globale (%)</label>
                  <input type="number" id="fRemise" class="field__input" value="0" min="0" max="100" step="0.5" />
                </div>
              </div>
              <div class="field">
                <label class="field__label" for="fConditions">Conditions de vente / paiement</label>
                <textarea id="fConditions" class="field__textarea" rows="4"></textarea>
              </div>
            </div>

            <div class="form-actions-bar">
              <button type="button" class="btn-link btn-link--danger" id="resetBtn">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5a4.5 4.5 0 1 1 1.5 3.35M2 6.5V3M2 6.5h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Réinitialiser le formulaire
              </button>
            </div>
          </form>
        </section>

        <!-- Preview -->
        <section class="invoice-preview" aria-label="Aperçu du document">
          <div class="preview-toolbar">
            <span class="preview-toolbar__label">Aperçu en direct</span>
            <div class="preview-toolbar__actions">
              <button type="button" class="btn btn--ghost btn--icon btn--sm" id="zoomOut" aria-label="Dézoomer">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 6h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              </button>
              <span class="preview-zoom" id="zoomLevel">100%</span>
              <button type="button" class="btn btn--ghost btn--icon btn--sm" id="zoomIn" aria-label="Zoomer">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 6h5M6 3.5v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              </button>
              <button type="button" class="btn btn--ghost btn--icon btn--sm" id="printBtn" aria-label="Imprimer">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="5" width="10" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M4 5V3h6v2M4 9h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
          <div class="preview-scroll" id="previewScroll">
            <div class="preview-page-wrap" id="previewWrap" style="transform:scale(1)">
              <div class="pdf-page" id="pdfPage"></div>
            </div>
          </div>
        </section>

      </div>
    </div>
  </div>

  <script src="assets/js/core/app.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script src="assets/js/core/layout.js"></script>
  <script src="assets/js/core/components.js"></script>
  <script src="assets/js/modules/invoice-template.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="assets/js/modules/pdf-export.js"></script>
  <script src="assets/js/core/api.js"></script>
  <script src="assets/js/pages/facture.js"></script>
</body>
</html>
