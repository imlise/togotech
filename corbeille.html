<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corbeille — Togo Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/pages/list.css" />
</head>
<body class="app" data-page="corbeille">
  <div id="app-root"></div>
  <div class="app-main">
    <header class="app-header" id="app-header"></header>
    <div class="app-content">
      <div class="page-head">
        <div class="page-head__text">
          <h1 class="page-head__title">Corbeille</h1>
          <p class="page-head__sub">Documents supprimés — restaurez ou effacez définitivement.</p>
        </div>
        <button class="btn btn--danger btn--sm" id="emptyTrash">Vider la corbeille</button>
      </div>
      <div class="card">
        <div class="table-wrap" style="border:none">
          <table class="data-table">
            <thead><tr><th>N° Document</th><th>Type</th><th>Client</th><th>Supprimé le</th><th>Actions</th></tr></thead>
            <tbody id="trashBody"></tbody>
          </table>
          <div class="empty-state" id="trashEmpty" hidden>
            <div class="empty-state__illustration empty-state__illustration--mint">
              <span class="empty-state__illustration__dot empty-state__illustration__dot--1"></span>
              <span class="empty-state__illustration__dot empty-state__illustration__dot--2"></span>
              <span class="empty-state__illustration__dot empty-state__illustration__dot--3"></span>
              <svg class="empty-state__illustration__glyph" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M7 6V4.5h10V6M9 10v6M12 10v6M15 10v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5.5 6l1 13.5a1.5 1.5 0 0 0 1.5 1.4h8a1.5 1.5 0 0 0 1.5-1.4L18.5 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
            <h3 class="empty-state__title">Corbeille vide</h3>
            <p class="empty-state__desc">Les documents supprimés apparaîtront ici pendant 30 jours.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/core/app.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script src="assets/js/core/layout.js"></script>
  <script src="assets/js/core/components.js"></script>
  <script src="assets/js/pages/corbeille.js"></script>
</body>
</html>
